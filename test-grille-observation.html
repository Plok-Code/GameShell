<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GameShell · Grille d'observation (session modérée)</title>
<style>
  :root{--bg:#0a0b14;--panel:#12131f;--line:#232538;--txt:#c9cee0;--dim:#6b7192;--faint:#3c415e;
    --cyan:#22d3ee;--mag:#e64bd0;--vio:#8b7bff;--ok:#41d68a;--err:#ff5470;--gold:#ffcc66}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"JetBrains Mono",ui-monospace,"Cascadia Code",Consolas,monospace}
  #app{max-width:860px;margin:0 auto;padding:26px 20px 60px}
  h1{font-size:16px;color:#eaf0ff;margin:0 0 4px}
  .sub{color:var(--dim);font-size:12px;margin-bottom:18px;line-height:1.5}
  .q{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px}
  .q b{color:var(--cyan)}
  .script{font-size:12.5px;line-height:1.7;color:var(--txt)}
  .script li{margin-bottom:6px}
  label{font-size:11px;color:var(--dim);display:block}
  input[type=text]{background:#0e1020;border:1px solid #2a2d44;border-radius:8px;color:#eaf0ff;
    font-family:inherit;font-size:13px;padding:7px 10px;margin-top:3px;width:100%}
  .fields{display:grid;grid-template-columns:minmax(180px,280px);gap:10px}
  .bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  button{background:#0e1020;border:1px solid #2a2d44;border-radius:8px;color:var(--txt);
    font-family:inherit;font-size:13px;padding:9px 13px;cursor:pointer}
  button:hover{border-color:var(--cyan);color:#eafcff}
  #lvlbox{display:flex;align-items:center;gap:6px}
  #lvl{width:64px;text-align:center;font-size:16px;background:#0e1020;border:1px solid #2a2d44;
    border-radius:8px;color:var(--gold);font-family:inherit;padding:7px 4px}
  .actions{display:flex;flex-wrap:wrap;gap:8px}
  .actions button{font-size:12.5px}
  .actions .neg{border-left:3px solid var(--err)}
  .actions .pos{border-left:3px solid var(--ok)}
  .actions .neu{border-left:3px solid var(--vio)}
  .twoin{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.twoin{grid-template-columns:1fr}}
  #cite{border-left:2px solid var(--cyan)}
  #note{border-left:2px solid var(--vio)}
  #log{width:100%;border-collapse:collapse;font-size:12px}
  #log td{border-bottom:1px solid #1a1d30;padding:5px 8px;vertical-align:top}
  #log td.t{color:var(--gold);white-space:nowrap}
  #log td.l{color:var(--vio);white-space:nowrap}
  #log td.x{text-align:right}
  #log td.x button{padding:1px 8px;font-size:11px;color:var(--faint)}
  #out{width:100%;min-height:180px;background:#0e1020;border:1px solid #2a2d44;border-radius:8px;
    color:var(--dim);font-family:inherit;font-size:11.5px;padding:10px;margin-top:8px}
  /* indicateur d'enregistrement */
  #saveline{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);margin:14px 0 4px}
  #savedot{width:9px;height:9px;border-radius:50%;background:#2a2d44;flex:none}
  #saveline.saved #savedot{background:var(--ok);box-shadow:0 0 8px #41d68a88}
  #saveline.saved #savetxt{color:var(--ok)}
  #savedot.blink{animation:sd .5s}
  @keyframes sd{0%{transform:scale(1)}40%{transform:scale(1.9)}100%{transform:scale(1)}}
  #restored{display:none;background:#0e1a22;border:1px solid #1d4a5a;border-left:3px solid var(--cyan);
    border-radius:9px;padding:8px 12px;font-size:12px;color:#d8f4fb;margin-bottom:10px}
  #restored.show{display:block}
</style>

<div id="app">
  <h1>Grille d'observation</h1>
  <div class="sub">Le <b>quantitatif</b> (temps, erreurs, game overs, timeouts, niveaux, étoiles, touches) est
  désormais logué <b>automatiquement</b> par le jeu. Ici tu ne notes plus que le <b>subjectif</b> : déclic,
  ennui, réactions, citations. On recoupe les deux flux à l'heure réelle après la session.</div>
  <div id="saveline"><span id="savedot"></span><span id="savetxt">prêt</span></div>
  <div id="restored"></div>

  <div class="q fields">
    <span><label>Code testeur</label><input type="text" id="who" placeholder="ex. S04-P012-V"></span>
  </div>

  <div class="q bar">
    <span id="lvlbox"><label style="display:inline">niveau (suis sa progression pour taguer tes notes)</label>
      <button id="lvldown">−</button><input id="lvl" value="1"><button id="lvlup">+</button></span>
    <span style="margin-left:auto"><button id="undo" title="Annuler la dernière entrée">Annuler</button></span>
  </div>

  <div class="q actions">
    <button class="pos" data-ev="déclic (comprend seule)" title="Elle pige une mécanique sans qu'on lui dise : ahh d'accord !. LE signal clé de ce test (déduire sans carton).">Déclic</button>
    <button class="pos" data-ev="réaction positive" title="Plaisir : sourire, cool, c'est satisfaisant.">Réaction positive</button>
    <button class="neg" data-ev="signe de frustration" title="Agacement : soupir d'énervement, tension, « ça m'énerve », jure, tape sur la touche.">Signe de frustration</button>
    <button class="neg" data-ev="signe d'ennui" title="Soupir, c'est long, déconcentration, regarde ailleurs.">Signe d'ennui</button>
  </div>
  <div class="q twoin">
    <div>
      <label>Citation</label>
      <input type="text" id="cite" placeholder="…" title="Ce qu'elle dit, mot pour mot. Entrée pour horodater.">
    </div>
    <div>
      <label>Note libre</label>
      <input type="text" id="note" placeholder="…" title="Ton observation à toi. Entrée pour horodater.">
    </div>
  </div>

  <div class="q"><table id="log"></table></div>

  <div class="q bar">
    <button id="download" style="border-color:var(--ok);color:var(--ok)" title="Télécharge le rapport en fichier .txt">Télécharger</button>
    <button id="export" title="Copie le rapport dans le presse-papier">Copier</button>
    <button id="reset" style="border-color:#5c2333;color:#c98a97;margin-left:auto" title="Efface toute la session en cours">Nouvelle session</button>
  </div>
  <textarea id="out" placeholder="aperçu du rapport"></textarea>

</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
let S={lvl:1, events:[], who:''};

/* ---- persistance locale, avec retour visible ---- */
function pad(n){ return String(n).padStart(2,'0'); }
function save(){
  try{
    localStorage.setItem('gs-obs', JSON.stringify(S));
    const d=new Date();
    const line=$('saveline'); line.classList.add('saved');
    $('savetxt').textContent='enregistré à '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())
      +' · '+S.events.length+' entrée'+(S.events.length>1?'s':'');
    const dot=$('savedot'); dot.classList.remove('blink'); void dot.offsetWidth; dot.classList.add('blink');
  }catch(e){
    $('saveline').classList.remove('saved');
    $('savetxt').textContent='enregistrement local impossible · TÉLÉCHARGE le rapport régulièrement';
  }
}
function load(){ try{ const d=JSON.parse(localStorage.getItem('gs-obs')); if(d&&d.events) S=d; }catch(e){} }

/* ---- horodatage absolu (heure réelle, pour recouper avec les logs auto du jeu) ---- */
const now=()=>Date.now();
function hms(at){ const d=new Date(at); return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }

/* ---- événements ---- */
function addEv(type, note){
  S.events.push({at:now(), lvl:S.lvl, type, note:note||''});
  save(); render();
}
function render(){
  const tb=$('log'); tb.innerHTML='';
  S.events.forEach(e=>{
    const tr=document.createElement('tr');
    tr.innerHTML='<td class="t">'+hms(e.at)+'</td><td class="l">niv '+e.lvl+'</td>'+
      '<td>'+e.type+(e.note?' : '+esc(e.note):'')+'</td>';
    tb.appendChild(tr);
  });
  tb.parentElement.scrollTop=tb.parentElement.scrollHeight;
  $('lvl').value=S.lvl;
  $('who').value=S.who;
}
function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

/* ---- contrôles ---- */
function setLvl(n){
  n=Math.max(1,n|0)||1;
  if(n!==S.lvl){ S.lvl=n; addEv('arrivée au niveau'); }
}
$('lvlup').onclick=()=>setLvl(S.lvl+1);
$('lvldown').onclick=()=>setLvl(S.lvl-1);
$('lvl').addEventListener('change',()=>setLvl(+$('lvl').value));
document.querySelectorAll('.actions button').forEach(b=>b.onclick=()=>addEv(b.dataset.ev));
$('cite').addEventListener('keydown',e=>{
  if(e.key==='Enter' && $('cite').value.trim()){ addEv('citation', $('cite').value.trim()); $('cite').value=''; }
});
$('note').addEventListener('keydown',e=>{
  if(e.key==='Enter' && $('note').value.trim()){ addEv('note', $('note').value.trim()); $('note').value=''; }
});
$('undo').onclick=()=>{ S.events.pop(); save(); render(); };
['who'].forEach(id=>$(id).addEventListener('input',()=>{ S[id]=$(id).value; save(); }));
$('reset').onclick=()=>{ if(confirm('Effacer toute la session ?')){ S={lvl:1,events:[],who:''}; save(); render(); $('out').value=''; } };

/* ---- construction du rapport (partagée par copier + télécharger) ---- */
function buildReport(){
  const perLvl={};
  S.events.forEach(e=>{
    if(e.type==='arrivée au niveau'||e.type==='citation'||e.type==='note') return;
    perLvl[e.lvl]=perLvl[e.lvl]||{};
    perLvl[e.lvl][e.type]=(perLvl[e.lvl][e.type]||0)+1;
  });
  const L=[
    '=== OBSERVATION GAMESHELL ('+new Date().toLocaleDateString('fr-FR')+') ===',
    'Code testeur : '+(S.who||'-')+' · '+S.events.length+' entrée'+(S.events.length>1?'s':''),
    '(quantitatif — temps, erreurs, game overs — dans les logs auto du jeu ; à recouper à l\'heure réelle)',
    '',
    '--- Signaux par niveau ---'
  ];
  Object.keys(perLvl).map(Number).sort((a,b)=>a-b).forEach(k=>{
    const c=Object.entries(perLvl[k]).map(([t,n])=>t+(n>1?' x'+n:'')).join(', ');
    if(c) L.push('niv '+k+' · '+c);
  });
  L.push('','--- Journal (heure réelle) ---');
  S.events.forEach(e=>L.push('['+hms(e.at)+'] niv '+e.lvl+' · '+e.type+(e.note?' : '+e.note:'')));
  return L.join('\n');
}
$('export').onclick=async()=>{
  const t=buildReport(); $('out').value=t;
  try{ await navigator.clipboard.writeText(t); $('savetxt').textContent='rapport copié dans le presse-papier'; }
  catch(e){ $('savetxt').textContent='copie impossible · utilise "Télécharger"'; }
};
$('download').onclick=()=>{
  const t=buildReport(); $('out').value=t;
  const name='observation-'+(S.who||'gameshell').replace(/[^\w-]/g,'')+'.txt';
  const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),1000);
  $('savetxt').textContent='rapport téléchargé : '+name;
};

/* ---- restauration d'une session précédente ---- */
load();
if(S.events.length){
  const r=$('restored'); r.classList.add('show');
  r.innerHTML='Session précédente restaurée : <b>'+S.events.length+' entrée'+(S.events.length>1?'s':'')+'</b>'
    +(S.who?' · '+S.who:'')
    +'. Continue, ou "Nouvelle session" pour repartir de zéro.';
  $('saveline').classList.add('saved');
  $('savetxt').textContent='restauré · '+S.events.length+' entrée'+(S.events.length>1?'s':'');
}
render();
</script>
